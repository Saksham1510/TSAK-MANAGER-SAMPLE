<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Project Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --bg2: #17171a;
    --bg3: #1e1e23;
    --bg4: #28282f;
    --border: #2e2e38;
    --border2: #3d3d4d;
    --text: #f0f0f5;
    --text2: #9090a8;
    --text3: #5a5a72;
    --accent: #7c6ff7;
    --accent2: #9b96fa;
    --accent-dim: #7c6ff720;
    --green: #4ade80;
    --green-dim: #4ade8020;
    --yellow: #fbbf24;
    --yellow-dim: #fbbf2420;
    --red: #f87171;
    --red-dim: #f8717120;
    --blue: #60a5fa;
    --blue-dim: #60a5fa20;
    --orange: #fb923c;
    --orange-dim: #fb923c20;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --transition: 0.18s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform var(--transition); }
  .main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
  .topbar { height: 60px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 50; }
  .content { padding: 28px; flex: 1; max-width: 1200px; width: 100%; }

  /* SIDEBAR */
  .sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo-text { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .nav-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); padding: 8px 10px 4px; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13.5px; font-weight: 500; transition: all var(--transition); margin-bottom: 2px; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent2); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-project { padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); margin-bottom: 2px; }
  .nav-project:hover { background: var(--bg3); }
  .nav-project.active { background: var(--accent-dim); }
  .nav-project-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .nav-project-name.active { color: var(--accent2); }
  .project-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sidebar-user { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-dim); border: 1.5px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--accent2); flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }

  /* TOPBAR */
  .topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-admin { background: var(--accent-dim); color: var(--accent2); border: 1px solid var(--accent); }
  .badge-member { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all var(--transition); font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 7px; background: var(--bg4); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); transition: all var(--transition); display: inline-flex; align-items: center; justify-content: center; }
  .btn-icon:hover { background: var(--bg3); color: var(--text); }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .card-sm { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
  .stat-value { font-size: 28px; font-weight: 600; line-height: 1.1; }
  .stat-sub { font-size: 12px; color: var(--text3); }

  /* FORMS */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 14px; padding: 9px 12px; transition: border-color var(--transition), box-shadow var(--transition); outline: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .form-select option { background: var(--bg3); }
  .form-textarea { resize: vertical; min-height: 80px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* TASK CARDS */
  .tasks-grid { display: flex; flex-direction: column; gap: 8px; }
  .task-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all var(--transition); display: flex; align-items: flex-start; gap: 12px; }
  .task-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border2); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all var(--transition); }
  .task-check.done { background: var(--green); border-color: var(--green); }
  .task-check.done::after { content: '✓'; font-size: 11px; color: #0f0f11; font-weight: 700; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .task-title.done { text-decoration: line-through; color: var(--text3); }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .task-actions { display: flex; gap: 6px; opacity: 0; transition: opacity var(--transition); }
  .task-card:hover .task-actions { opacity: 1; }

  /* PRIORITY / STATUS BADGES */
  .priority { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .priority-high { background: var(--red-dim); color: var(--red); }
  .priority-medium { background: var(--yellow-dim); color: var(--yellow); }
  .priority-low { background: var(--green-dim); color: var(--green); }
  .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .status-todo { background: var(--bg4); color: var(--text2); }
  .status-progress { background: var(--blue-dim); color: var(--blue); }
  .status-review { background: var(--yellow-dim); color: var(--yellow); }
  .status-done { background: var(--green-dim); color: var(--green); }
  .status-overdue { background: var(--red-dim); color: var(--red); }

  /* PROJECT CARDS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: all var(--transition); }
  .project-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
  .project-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .project-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .project-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .project-desc { font-size: 12.5px; color: var(--text3); margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .progress-bar-wrap { background: var(--bg4); border-radius: 99px; height: 5px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.5s ease; }
  .project-footer { display: flex; justify-content: space-between; align-items: center; }
  .member-stack { display: flex; }
  .member-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--bg4); border: 2px solid var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--text2); margin-left: -6px; }
  .member-avatar:first-child { margin-left: 0; }

  /* KANBAN */
  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
  .kanban-col { background: var(--bg3); border-radius: var(--radius); padding: 14px; }
  .kanban-col-header { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .kanban-count { background: var(--bg4); border-radius: 99px; padding: 1px 7px; font-size: 11px; color: var(--text3); }
  .kanban-task { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all var(--transition); }
  .kanban-task:hover { border-color: var(--accent); }

  /* AUTH */
  .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
  .auth-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 420px; }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo-text { font-size: 24px; font-weight: 600; letter-spacing: -0.8px; }
  .auth-logo-text span { color: var(--accent); }
  .auth-tagline { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .auth-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .auth-sub { font-size: 13.5px; color: var(--text3); margin-bottom: 24px; }
  .auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text3); }
  .auth-switch a { color: var(--accent2); cursor: pointer; font-weight: 500; }
  .auth-switch a:hover { text-decoration: underline; }

  /* TEAM PAGE */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .team-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; text-align: center; }
  .team-avatar-lg { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-dim); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: var(--accent2); margin: 0 auto 12px; }

  /* CHARTS */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .alert-error { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
  .alert-success { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
  .alert-info { background: var(--blue-dim); border: 1px solid var(--blue); color: var(--blue); }

  /* MISC */
  .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
  .page-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 15px; font-weight: 600; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  .tab-bar { display: flex; gap: 4px; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 20px; }
  .tab { flex: 1; text-align: center; padding: 7px 12px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-radius: var(--radius-sm); transition: all var(--transition); }
  .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .chip { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: var(--bg4); color: var(--text3); }
  .assignee-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; background: var(--bg4); color: var(--text2); }
  .due-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3); }
  .due-chip.overdue { color: var(--red); }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filter-select { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-family: inherit; font-size: 12px; padding: 5px 10px; cursor: pointer; outline: none; }

  /* ACTIVITY */
  .activity-list { display: flex; flex-direction: column; gap: 0; }
  .activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .activity-text { font-size: 13px; color: var(--text2); }
  .activity-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  /* SVG ICONS inline */
  .icon { display: inline-block; vertical-align: middle; }

  /* TOOLTIPS */
  [title] { cursor: help; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .kanban { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .kanban { grid-template-columns: 1fr; }
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  if (!tasks.length) return 0;
  return Math.round((tasks.filter(t => t.status === 'done').length / tasks.length) * 100);
};

<div class="page-header">

const filterTasks = tasks => {
  let t = [...tasks];
  if (state.taskFilter.status === 'overdue') t = t.filter(x => x.status !== 'done' && isOverdue(x.dueDate));
  else if (state.taskFilter.status !== 'all') t = t.filter(x => x.status === state.taskFilter.status);
  if (state.taskFilter.priority !== 'all') t = t.filter(x => x.priority === state.taskFilter.priority);
  if (state.taskFilter.assignee !== 'all') t = t.filter(x => x.assigneeId === state.taskFilter.assignee);
  return t;
};

  const assignee = getUserById(t.assigneeId);
  const project = showProject ? getProjects().find(p => p.id === t.projectId) : null;
  const od = t.status !== 'done' && isOverdue(t.dueDate);
  const statusMap = {todo:'To Do',progress:'In Progress',review:'In Review',done:'Done'};

  return `
<div class="task-card" data-action="edit-task" data-tid="${t.id}">
  <div class="task-check ${t.status==='done'?'done':''}" data-action="toggle-task" data-tid="${t.id}" onclick="event.stopPropagation()"></div>
  <div class="task-body">
    <div class="task-title ${t.status==='done'?'done':''}">${t.title}</div>
    <div class="task-meta">
      <span class="priority priority-${t.priority}">${t.priority}</span>
      <span class="status-badge status-${od?'overdue':t.status}">${od?'Overdue':statusMap[t.status]||t.status}</span>
      ${assignee ? `<span class="assignee-chip" style="background:${assignee.color}15;color:${assignee.color}">${assignee.avatar} ${assignee.name.split(' ')[0]}</span>` : ''}

  <div class="task-actions">
    <button class="btn-icon" data-action="edit-task" data-tid="${t.id}" onclick="event.stopPropagation()">${icons.edit}</button>

// ========== ACTIONS ==========
const actions = {
  login() {
    const email = v('auth-email');
    const password = v('auth-password');
    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);
    if (!user) { toast('Invalid email or password.', 'error'); return; }
    state.currentUser = user;
    DB.set('session', user);
    state.page = 'dashboard';
    render();
  },
  signup() {
    const name = v('auth-name');
    const email = v('auth-email');
    const password = v('auth-password');
    const role = v('auth-role');
    if (!name || !email || !password) { toast('Please fill in all fields.', 'error'); return; }
    const users = getUsers();
    if (users.find(u => u.email === email)) { toast('Email already in use.', 'error'); return; }
    const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const colors = ['#7c6ff7','#60a5fa','#4ade80','#fbbf24','#fb923c','#e879f9'];
    const newUser = { id: 'u'+uid(), name, email, password, role, avatar: initials, color: colors[Math.floor(Math.random()*colors.length)], joinedAt: now() };
    users.push(newUser);
    DB.set('users', users);
    state.currentUser = newUser;
    DB.set('session', newUser);
    state.page = 'dashboard';
    render();
  },
  logout() {
    state.currentUser = null;
    DB.del('session');
    state.page = 'auth';
    state.authMode = 'login';
    render();
  },
  'toggle-auth'() {
    state.authMode = state.authMode === 'login' ? 'signup' : 'login';
    render();
  },
  'new-project'() {
    if (!isAdmin()) { toast('Only admins can create projects.', 'error'); return; }
    state.modal = 'new-project';
    state.editTarget = null;
    render();
  },
  'create-project'() {
    const name = v('proj-name');
    if (!name) { toast('Project name is required.', 'error'); return; }
    const members = [...document.querySelectorAll('.proj-member:checked')].map(c => c.value);
    const project = { id: 'p'+uid(), name, description: v('proj-desc'), color: v('proj-color'), emoji: v('proj-emoji'), status: v('proj-status'), members: members.length ? members : [state.currentUser.id], createdBy: state.currentUser.id, createdAt: now() };
    const projects = getProjects();
    projects.push(project);
    DB.set('projects', projects);
    saveActivity('created project', name);
    state.modal = null;
    toast('Project created!', 'success');
    render();
  },
  'edit-project'(el) {
    const pid = el.dataset.pid;
    const projects = getProjects();
    state.editTarget = projects.find(p => p.id === pid);
    state.modal = 'edit-project';
    render();
  },
  'update-project'(el) {
    const pid = el.dataset.pid;
    const name = v('proj-name');
    if (!name) { toast('Project name is required.', 'error'); return; }
    const members = [...document.querySelectorAll('.proj-member:checked')].map(c => c.value);
    const projects = getProjects();
    const idx = projects.findIndex(p => p.id === pid);
    if (idx >= 0) {
      projects[idx] = { ...projects[idx], name, description: v('proj-desc'), color: v('proj-color'), emoji: v('proj-emoji'), status: v('proj-status'), members: members.length ? members : [state.currentUser.id] };
      DB.set('projects', projects);
    }
    state.modal = null;
    toast('Project updated!', 'success');
    render();
  },
  'delete-project'(el) {
    if (!isAdmin()) { toast('Only admins can delete projects.', 'error'); return; }
    if (!confirm('Delete this project and all its tasks?')) return;
    const pid = el.dataset.pid;
    DB.set('projects', getProjects().filter(p => p.id !== pid));
    DB.set('tasks', getTasks().filter(t => t.projectId !== pid));
    if (state.activeProjectId === pid) { state.activeProjectId = null; state.page = 'projects'; }
    toast('Project deleted.', 'success');
    render();
  },
  'new-task'(el) {
    state.modal = 'new-task';
    state.editTarget = { _defaultStatus: el?.dataset?.status || 'todo' };
    render();
  },
  'create-task'() {
    const title = v('task-title');
    if (!title) { toast('Task title is required.', 'error'); return; }
    const task = { id: 't'+uid(), projectId: v('task-project'), title, description: v('task-desc'), priority: v('task-priority'), status: v('task-status'), assigneeId: v('task-assignee') || null, dueDate: v('task-due') || null, tags: [], createdBy: state.currentUser.id, createdAt: now() };
    const tasks = getTasks();
    tasks.push(task);
    DB.set('tasks', tasks);
    saveActivity('created task', title);
    state.modal = null;
    toast('Task created!', 'success');
    render();
  },
  'edit-task'(el) {
    const tid = el.dataset.tid;
    state.editTarget = getTasks().find(t => t.id === tid);
    state.modal = 'edit-task';
    render();
  },
  'update-task'(el) {
    const tid = el.dataset.tid;
    const title = v('task-title');
    if (!title) { toast('Task title is required.', 'error'); return; }
    const tasks = getTasks();
    const idx = tasks.findIndex(t => t.id === tid);
    if (idx >= 0) {
      tasks[idx] = { ...tasks[idx], title, description: v('task-desc'), projectId: v('task-project'), assigneeId: v('task-assignee') || null, priority: v('task-priority'), status: v('task-status'), dueDate: v('task-due') || null };
      DB.set('tasks', tasks);
    }
    state.modal = null;
    toast('Task updated!', 'success');
    render();
  },
  'delete-task'(el) {
    const tid = el.dataset.tid;
    const task = getTasks().find(t => t.id === tid);
    if (!isAdmin() && task?.createdBy !== state.currentUser.id) { toast('Permission denied.', 'error'); return; }
    if (!confirm('Delete this task?')) return;
    DB.set('tasks', getTasks().filter(t => t.id !== tid));
    toast('Task deleted.', 'success');
    render();
  },
  'toggle-task'(el) {
    const tid = el.dataset.tid;
    const tasks = getTasks();
    const idx = tasks.findIndex(t => t.id === tid);
    if (idx >= 0) {
      tasks[idx].status = tasks[idx].status === 'done' ? 'todo' : 'done';
      DB.set('tasks', tasks);
      saveActivity(tasks[idx].status === 'done' ? 'completed task' : 'reopened task', tasks[idx].title);
    }
    render();
  },
  'invite-user'(el) {
    if (!isAdmin()) { toast('Only admins can manage teams.', 'error'); return; }
    if (el?.dataset?.pid) state.activeProjectId = el.dataset.pid;
    state.modal = 'invite-user';
    render();
  },
  'do-invite'() {
    const pid = v('inv-project');
    const uid_inv = v('inv-user');
    const projects = getProjects();
    const idx = projects.findIndex(p => p.id === pid);
    if (idx >= 0) {
      if (!projects[idx].members.includes(uid_inv)) {
        projects[idx].members.push(uid_inv);
        DB.set('projects', projects);
        const u = getUserById(uid_inv);
        saveActivity('added', `${u?.name} to ${projects[idx].name}`);
        toast('Member added!', 'success');
      } else {
        toast('User is already a member.', 'error');
      }
    }
    state.modal = null;
    render();
  },
  'remove-member'(el) {
    if (!isAdmin()) return;
    const uid_rm = el.dataset.uid;
    const pid = el.dataset.pid;
    const projects = getProjects();
    const idx = projects.findIndex(p => p.id === pid);
    if (idx >= 0) {
      projects[idx].members = projects[idx].members.filter(m => m !== uid_rm);
      DB.set('projects', projects);
      toast('Member removed.', 'success');
    }
    render();
  },
  'toggle-role'(el) {
    if (!isAdmin()) return;
    const uid_r = el.dataset.uid;
    const users = getUsers();
    const idx = users.findIndex(u => u.id === uid_r);
    if (idx >= 0) {
      users[idx].role = users[idx].role === 'admin' ? 'member' : 'admin';
      DB.set('users', users);
      toast(`Role changed to ${users[idx].role}.`, 'success');
    }
    render();
  },
  'remove-user'(el) {
    if (!isAdmin()) return;
    const uid_rm = el.dataset.uid;
    if (!confirm('Remove this user?')) return;
    DB.set('users', getUsers().filter(u => u.id !== uid_rm));
    const projects = getProjects();
    projects.forEach(p => p.members = p.members.filter(m => m !== uid_rm));
    DB.set('projects', projects);
    toast('User removed.', 'success');
    render();
  },
  'task-view'(el) {
    state.taskView = el.dataset.view;
    render();
  },
  'close-modal'() {
    state.modal = null;
    state.editTarget = null;
    render();
  },
  'clear-filters'() {
    state.taskFilter = { status: 'all', priority: 'all', assignee: 'all' };
    render();
  },
  'save-profile'() {
    const name = v('set-name');
    const email = v('set-email');
    if (!name || !email) { toast('Name and email required.', 'error'); return; }
    const users = getUsers();
    const idx = users.findIndex(u => u.id === state.currentUser.id);
    if (idx >= 0) {
      const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      users[idx] = { ...users[idx], name, email, avatar: initials };
      DB.set('users', users);
      state.currentUser = users[idx];
      DB.set('session', users[idx]);
    }
    toast('Profile updated!', 'success');
    render();
  },
  'save-password'() {
    const pw = v('set-password');
    if (!pw || pw.length < 6) { toast('Password must be at least 6 characters.', 'error'); return; }
    const users = getUsers();
    const idx = users.findIndex(u => u.id === state.currentUser.id);
    if (idx >= 0) { users[idx].password = pw; DB.set('users', users); }
    toast('Password updated!', 'success');
    render();
  }
};

// ========== EVENT BINDING ==========
const bindEvents = () => {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      const action = el.dataset.action;
      if (actions[action]) actions[action](el);
    });
  });
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      const nav = el.dataset.nav;
      if (nav === 'project') {
        state.activeProjectId = el.dataset.pid;
        state.page = 'project-detail';
        state.taskFilter = { status: 'all', priority: 'all', assignee: 'all' };
      } else {
        state.page = nav;
      }
      render();
    });
  });
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('change', () => {
      state.taskFilter[el.dataset.filter] = el.value;
      render();
    });
  });
};

// ========== UTILS ==========
const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
const toast = (msg, type = 'success') => { state.toast = { msg, type }; };
const getGreeting = () => { const h = new Date().getHours(); return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening'; };
const formatDate = d => { if (!d) return ''; const dt = new Date(d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const timeAgo = iso => {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}d ago`;
  if (h > 0) return `${h}h ago`;
  if (m > 0) return `${m}m ago`;
  return 'just now';
};

// ========== INIT ==========
initData();
render();
</script>
